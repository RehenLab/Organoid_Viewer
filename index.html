<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organoid Navigator</title>

  <!-- Includes OpenSeadragon -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/2.4.2/openseadragon.min.js"></script>
  <script src="/organoidviewer.github.io/openseadragon/openseadragon-filtering.js"></script>

  <style>
    html {
      width: 715px;
      height: 730px;
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      width: 715px;
      height: 730px;
    }

    .draggable {
      cursor: move;
      cursor: url(/organoidviewer.github.io/images/grab.cur);
      cursor: grab;
    }

    .draggable:active {
      cursor: url(/organoidviewer.github.io/images/grabbing.cur);
      cursor: grabbing;
    }

    #focus-container {
      width: 640px;
      height: 480px;
      position: relative;
      top: 5px;
      background-color: black;
    }

    #slider-container {
      position: relative;
      display: inline-block;
      background-color: #e0e0e0;
      background-image: url(/organoidviewer.github.io/images/ruler_2.png);
      padding: 20px;
      border: 2px solid #333;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 440px;
      height: 13px;
      transform: rotate(90deg);
      right: -329px;
      top: -263.5px;

    }

    #slider-label {
      font-family: Helvetica, sans-serif;
      font-size: 18px;
      font-weight: bold;
      color: #333;
      position: relative;
      width: 470px;
      transform: rotate(90deg);
      right: -458px;
      top: -312px;
    }

    #slider {
      -webkit-appearance: none;
      width: 470px;
      height: 10px;
      position: relative;
      transform: rotate(270deg);
      transform-origin: top left;
      right: -550px;
      top: -85px;
      margin: auto;
    }

    #slider::-webkit-slider-runnable-track {
      background: #b9cff7;
      height: 10px;
      border-radius: 5px;
    }

    #slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 19px;
      height: 19px;
      background-image: url(/organoidviewer.github.io/images/button2.png);
      border-radius: 50%;
      position: relative;
      top: -5px;
      right: 1px;
    }

    #slider::-moz-range-track {
      background: #b9cff7;
      height: 10px;
      border-radius: 5px;
    }

    #slider::-moz-range-thumb {
      -moz-appearance: none;
      background: transparent;
      border: transparent;
      height: 19px;
      width: 19px;
      background-image: url(/organoidviewer.github.io/images/button2.png);
      border-radius: 50%;
      position: relative;
      top: -5px;
      right: 1px;
    }

    #slider::-ms-thumb {
      background: transparent;
      height: 19px;
      width: 19px;
      background-image: url(/organoidviewer.github.io/images/button2.png);
      border-radius: 50%;
      position: relative;
      top: -5px;
      right: 1px;
    }

    #slider::-ms-ticks-after {
      display: none;
    }

    #slider::-ms-ticks-before {
      display: none;
    }

    #slider::-ms-track {
      background: #b9cff7;
      color: transparent;
      height: 10px;
      border: none;
      border-radius: 5px;
    }

    #slider::-ms-tooltip {
      display: none;
    }

    #gamma-container {
      position: relative;
      top: -84px;
      left: 473px;
      height: 20px;
      width: 160px;
      background-color: #fffefe;
      border: 2px solid #333;
      padding: 2px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    /* The switch - the box around the slider */
    .switch {
      position: relative;
      top: 3px;
      left: 0px;
      display: inline-block;
      width: 40px;
      height: 15px;
    }

    /* Hide default HTML checkbox */
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    /* The slider */
    .slider {
      position: absolute;
      cursor: pointer;
      top: -1px;
      left: 0;
      right: 4px;
      bottom: 0;
      background-color: #b9cff7;
      -webkit-transition: .4s;
      transition: .4s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 19px;
      width: 19px;
      left: -2px;
      bottom: -1px;
      background-image: url(/organoidviewer.github.io/images/button2.png);
      -webkit-transition: .4s;
      transition: .4s;
    }

    input:checked + .slider {
      background-color: #0acf94;
    }

    input:focus + .slider {
      box-shadow: 0 0 1px #0acf94;
    }

    input:checked + .slider:before {
      -webkit-transform: translateX(23px);
      -ms-transform: translateX(23px);
      transform: translateX(23px);
    }

    .slider.round {
      border-radius: 34px;
    }

    .slider.round:before {
      border-radius: 50%;
    }

    .switch-label {
      position: relative;
      left: 0px; 
      top: 1px;
      font-family: Helvetica, sans-serif;
      font-size: 15px;
      font-weight: bold;
      color: #333;
      white-space: nowrap;
      display: inline-block;
    } 

    .checkbox-org-container {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      align-self: stretch;
      width: 100%;
      margin-top: -105px;
      margin-left: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    .checkbox-org-label {
      margin-top: 8px;
      font-size: 17px;
      text-align: left;
      font-weight: normal;
    }

    .checkbox-photo-container {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      align-self: stretch;
      width: 100%;
      margin-top: 20px;
      margin-left: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    .checkbox-photo-label {
      margin-top: 8px;
      font-size: 17px;
      text-align: left;
      font-weight: normal;
    }

    .warning {
      margin-top: 18px;
      margin-left: 491px;
      text-align: justify;
      font-size: 14px;
      color: red;
    }
  </style>
</head>

<body>
  <div id="main">
    <h3 id="label">Organoid Classification</h3>

    <div style="margin-bottom: 20px; padding-top: 10px;">
    Enter organoid number (between 1 and 421):
    <input type="text" id="organoid-input" style="padding: 5px; width: 150px;">
    <button id="load-btn" style="padding: 5px 15px; cursor: pointer;">Load Organoid</button>
    </div>

    <!-- Box for the focus slider -->
    <div id="focus-container"></div>
    <div id="slider-container"></div>
    <div id="slider-label">Focus Adjustment</div>
    <input class="draggable" type="range" id="slider" min="1" max="5" value="1" step="1">

    <!-- Gamma adjustment control -->    
    <div id="gamma-container">
      <label class="switch">
        <input type="checkbox">
        <span class="slider round"></span>
      </label>
      <span class="switch-label">Gamma Tuning</span>
    </div>

    <!-- Selection Boxes -->
    <div class="checkbox-org-container">Classify the organoid above:
      <label class="checkbox-org-label">
        <input type="radio" name="selection-org" value="Acceptable"> Acceptable
      </label>
      <label class="checkbox-org-label">
        <input type="radio" name="selection-org" value="Not Acceptable"> Not acceptable
      </label>
      <label class="checkbox-org-label">
        <input type="radio" name="selection-org" value="Not Loaded"> Image did not load
      </label>
    </div>   
  </div>

  <script>
    let viewer; // Define viewer globally to manage instances

    window.onload = function() {
      const loadBtn = document.getElementById('load-btn');
      const inputField = document.getElementById('organoid-input');

      loadBtn.addEventListener('click', () => {
        loadOrganoid(inputField.value);
      });

      inputField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loadOrganoid(inputField.value);
      });

      // Listen for toggle changes and apply to current viewer
      const toggleSwitch = document.querySelector('.switch input');
      toggleSwitch.addEventListener('change', function() {
        applyFilters();
      });
    };

    // Helper function to apply filters based on current switch state
    function applyFilters() {
      if (!viewer) return;

      const isTuned = document.querySelector('.switch input').checked;
      
      if (isTuned) {
        viewer.setFilterOptions({
          filters: {
            processors: [
              OpenSeadragon.Filters.GAMMA(0.5),
              OpenSeadragon.Filters.BRIGHTNESS(-15)
            ]
          }
        });
      } else {
        viewer.setFilterOptions({
          filters: {
            processors: OpenSeadragon.Filters.GAMMA(1)
          }
        });
      }
    }

    // Loading organoid
    function loadOrganoid(photoNumber) {
      const num = parseInt(photoNumber, 10);

      if (isNaN(num) || num < 1 || num > 421) {
        alert("Please enter a valid number between 1 and 421");
        return;
      }

      if (viewer) {
        viewer.destroy();
      }

      viewer = OpenSeadragon({
        id: "focus-container",
        prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/2.4.2/images/",
        showFullPageControl: false,
        showNavigator: true,
        maxZoomPixelRatio: 4,
        tileSources: `images/Organoid_${num}/focus_1.xml`,
        blendTime: 0.2,
        immediateRender: true
      });

      // APPLY FILTERS IMMEDIATELY ON LOAD
      // This ensures if the switch is already "ON", the new image gets filtered
      viewer.addHandler('open', function() {
        applyFilters();
      });

      // RE-ATTACH SLIDER LOGIC
      const slider = document.getElementById("slider");
      slider.value = 1; 
      
      const newSlider = slider.cloneNode(true);
      slider.parentNode.replaceChild(newSlider, slider);

      newSlider.addEventListener('input', function() {
        const focusLevel = this.value;
        const zoom = viewer.viewport.getZoom();
        const center = viewer.viewport.getCenter();

        viewer.addTiledImage({
          tileSource: `images/Organoid_${num}/focus_${focusLevel}.xml`,
          success: function(event) {
            viewer.viewport.zoomTo(zoom, center);
            if (viewer.world.getItemCount() > 1) {
              viewer.world.removeItem(viewer.world.getItemAt(0));
            }
            // Re-apply filters to the new tiled image
            applyFilters();
          }
        });
      });
    }
  </script>
</body>

</html>
